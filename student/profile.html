    <script>
document.addEventListener('DOMContentLoaded', async () => {
  let currentUserData = null;

  try {
    // Charger les données du profil
    const response = await fetch('/api/auth/me', {
      credentials: 'include'
    });
    
    if (!response.ok) {
      if (response.status === 401) {
        window.location.href = '../index.html';
        return;
      }
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    currentUserData = await response.json();
    console.log('Profile data received:', currentUserData);

    // Mettre à jour les champs du formulaire
    document.getElementById('fullName').value = 
      `${currentUserData.firstName || ''} ${currentUserData.lastName || ''}`.trim();
    document.getElementById('email').value = currentUserData.email || '';
    document.getElementById('phone').value = currentUserData.phone || '';
    
    // Formater la date de naissance
    if (currentUserData.birthDate) {
      const birthDate = new Date(currentUserData.birthDate);
      document.getElementById('birthDate').value = 
        birthDate.toISOString().split('T')[0];
    } else {
      document.getElementById('birthDate').value = '';
    }
    
    // Mettre à jour la photo de profil
    updateProfilePhoto(currentUserData);
    
  } catch (error) {
    console.error('Profile load error:', error);
    showError('Erreur lors du chargement du profil');
  }

  // Gestionnaire pour le changement de photo
  document.getElementById('changePhotoBtn').addEventListener('click', () => {
    document.getElementById('photoUpload').click();
  });

  document.getElementById('photoUpload').addEventListener('change', handlePhotoUpload);

  // Gestionnaire pour la soumission du formulaire
  document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    await updateProfile();
  });
});

async function updateProfile() {
  try {
    // Récupérer les valeurs du formulaire
    const fullName = document.getElementById('fullName').value.trim();
    const [firstName, ...lastNameParts] = fullName.split(' ');
    const lastName = lastNameParts.join(' ');
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const birthDate = document.getElementById('birthDate').value;

    const response = await fetch('/api/students/profile', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
      },
      credentials: 'include',
      body: JSON.stringify({
        firstName,
        lastName,
        email,
        phone,
        birthDate
      })
    });

    const result = await response.json();
    
    if (!response.ok) {
      throw new Error(result.message || 'Échec de la mise à jour');
    }

    showSuccess('Profil mis à jour avec succès');
    
  } catch (error) {
    console.error('Update failed:', error);
    showError(`Échec de la mise à jour: ${error.message}`);
  }
}

async function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const formData = new FormData();
    formData.append('profilePhoto', file);

    const response = await fetch('/api/students/profile/photo', {
      method: 'POST',
      body: formData,
      credentials: 'include'
    });

    const result = await response.json();
    
    if (!response.ok) {
      throw new Error(result.message || 'Upload failed');
    }

    updateProfilePhoto({ profilePhoto: result.photoUrl });
    showSuccess('Photo mise à jour avec succès');
    
  } catch (error) {
    console.error('Upload failed:', error);
    showError(`Échec de l'upload: ${error.message}`);
  } finally {
    e.target.value = ''; // Reset file input
  }
}

function updateProfilePhoto(userData) {
  const profilePhoto = document.getElementById('profilePhoto');
  if (userData.profilePhoto) {
    profilePhoto.src = userData.profilePhoto;
  } else {
    // Fallback avec initiales
    const initials = (userData.firstName?.charAt(0) || 'U');
    profilePhoto.src = `https://placehold.co/300x300?text=${initials}`;
  }
}

function showSuccess(message) {
  Swal.fire({
    icon: 'success',
    title: 'Succès',
    text: message,
    confirmButtonColor: '#5461FF',
    timer: 2000
  });
}

function showError(message) {
  Swal.fire({
    icon: 'error',
    title: 'Erreur',
    text: message,
    confirmButtonColor: '#5461FF'
  });
}
    </script>

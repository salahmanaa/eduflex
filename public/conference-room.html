<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Conference Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .video-container {
            position: relative;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .name-tag {
            position: absolute;
            bottom: 40px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .video-controls button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        .video-controls button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        #main-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
        }

        #main-controls button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #main-controls button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        #end-call {
            background-color: #dc3545 !important;
        }

        #end-call:hover {
            background-color: #bb2d3b !important;
        }

        #participants-list {
            position: fixed;
            right: 20px;
            top: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            max-width: 250px;
        }

        .participant-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .participant-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div id="video-grid"></div>

    <div id="participants-list">
        <h5>Participants</h5>
        <div id="participants-container"></div>
    </div>

    <div id="main-controls">
        <button id="toggle-audio" title="Toggle Microphone">
            <i class="fas fa-microphone"></i>
        </button>
        <button id="toggle-video" title="Toggle Camera">
            <i class="fas fa-video"></i>
        </button>
        <button id="share-screen" title="Share Screen">
            <i class="fas fa-desktop"></i>
        </button>
        <button id="end-call" title="End Call">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="/js/videoConference.js"></script>
    <script>
        // Get conference details from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('roomId');
        const userId = urlParams.get('userId');
        const username = urlParams.get('username');
        const isTeacher = urlParams.get('isTeacher') === 'true';

        if (!roomId || !userId || !username) {
            alert('Invalid conference parameters');
            window.location.href = '/';
        }

        // Initialize video conference
        const conference = new VideoConference(roomId, userId, username, isTeacher);
        conference.init();

        // Setup main controls
        document.getElementById('toggle-audio').addEventListener('click', () => {
            const button = document.getElementById('toggle-audio');
            conference.toggleAudio(
                document.querySelector(`#video-${userId} video`),
                button
            );
        });

        document.getElementById('toggle-video').addEventListener('click', () => {
            const button = document.getElementById('toggle-video');
            conference.toggleVideo(
                document.querySelector(`#video-${userId} video`),
                button
            );
        });

        document.getElementById('end-call').addEventListener('click', () => {
            conference.endCall();
            window.location.href = isTeacher ? '/teacher/conference.html' : '/student/conferences.html';
        });

        // Handle beforeunload to clean up
        window.addEventListener('beforeunload', () => {
            conference.endCall();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlex - Forum</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/etud-style.css">
</head>
<body>
    <div class="sidebar py-3">
        <div class="text-center py-3 mb-3">
            <a class="navbar-brand fw-bold" href="../index.html">
                <span class="text-gradient fs-4">EduFlex</span>
            </a>
        </div>
        <div class="px-3">
            <div class="position-relative mb-4">
                <input type="text" class="form-control search-input py-2" placeholder="Rechercher...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <p class="text-muted small text-uppercase ms-3 mb-2">Administration</p>
            <ul class="nav flex-column mb-4">
                <li class="nav-item">
                    <a class="nav-link" href="admin-dashboard.html">
                        <i class="fas fa-th-large"></i> Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="admin-users.html">
                        <i class="fas fa-users"></i> Utilisateurs
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="admin-instructors.html">
                        <i class="fas fa-chalkboard-teacher"></i> Formateurs
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="admin-analytics.html">
                        <i class="fas fa-chart-line"></i> Analytiques
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="admin-reports.html">
                        <i class="fas fa-file-alt"></i> Rapports
                    </a>
                </li>
            </ul>
            <p class="text-muted small text-uppercase ms-3 mb-2">Communication</p>
            <ul class="nav flex-column mb-4">
                
                <li class="nav-item">
                    <a class="nav-link active" href="admin-forum.html">
                        <i class="fas fa-comments"></i> Forum
                    </a>
                </li>
            </ul>
            <p class="text-muted small text-uppercase ms-3 mb-2">Système</p>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="admin-profile.html">
                        <i class="fas fa-user-cog"></i> Mon Profil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../index.html">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>


    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 fw-bold">Gestion du Forum</h2>
            <div class="d-flex align-items-center">
                <!-- Same navbar content as admin-dashboard.html -->
            </div>
        </div>

    

        <!-- Forum Content -->
        <div class="row g-4">
            <!-- Forum Categories -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Catégories</h5>
                    </div>
                    <div class="list-group list-group-flush" id="categoryContainer"></div>
                </div>
            </div>
            <!-- Discussions Section -->
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h5 class="mb-0 fw-bold">Discussions Réelles</h5>
                        <button class="btn btn-primary" id="createDiscussionBtn">
                            <i class="fas fa-plus me-2"></i>Nouvelle Discussion
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="discussionsContainer"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Comments Modal -->
        <div class="modal fade" id="commentsModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Commentaires</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="commentsContainer"></div>
                        <form id="commentForm" class="mt-3">
                            <div class="mb-3">
                                <textarea class="form-control" id="commentContent" rows="2" placeholder="Ajouter un commentaire..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Envoyer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Create Discussion Modal -->
        <div class="modal fade" id="createDiscussionModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Nouvelle Discussion</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="discussionForm">
                            <div class="mb-3">
                                <label class="form-label">Titre</label>
                                <input type="text" class="form-control" id="discussionTitle" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Catégorie</label>
                                <select class="form-select" id="discussionCategory" required>
                                    <option value="">Choisir une catégorie</option>
                                    <!-- Categories will be loaded dynamically -->
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contenu</label>
                                <textarea class="form-control" id="discussionContent" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Forum JS -->
    <script src="../assets/js/forum.js"></script>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a').forEach(function(link) {
        if (link.textContent.includes('Déconnexion')) {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
              .then(() => window.location.href = '../index.html');
          });
        }
      });
    });
    </script>
</body>
</html>
